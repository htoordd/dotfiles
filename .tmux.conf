##### Prefix: Ctrl-a #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Reload config: prefix + r #####
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

##### Window numbering starts at 1 #####
set -g base-index 1
setw -g pane-base-index 1

##### Auto-renumber windows when one is closed #####
set -g renumber-windows on

##### Increase scrollback history #####
set -g history-limit 50000

##### Mouse: ON by default #####
set -g mouse on

##### Toggle mouse with: prefix + m #####
# When mouse is OFF, you can drag-select in your terminal like normal.
bind m run-shell ' \
  current="$(tmux show -gqv mouse)"; \
  if [ "$current" = "on" ]; then \
    tmux set -g mouse off \; display-message "Mouse: OFF (terminal selection enabled)"; \
  else \
    tmux set -g mouse on  \; display-message "Mouse: ON (tmux mouse mode)"; \
  fi'

##### Window Splitting: Open in current directory #####
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

##### Friendlier split bindings: | for horizontal, - for vertical #####
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### Window Creation: Open in current directory #####
bind c new-window -c "#{pane_current_path}"

##### Disable pane border status line #####
set -g pane-border-status off

##### Minimal / useful bottom status bar (Dracula-inspired) #####
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre

# Dracula palette
# bg=#282a36, fg=#f8f8f2, comment=#6272a4, cyan=#8be9fd
# green=#50fa7b, orange=#ffb86c, pink=#ff79c6, purple=#bd93f9

# Base styling: darker bg, muted foreground
set -g status-style "bg=#1e1f29,fg=#6272a4"
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g mode-style "bg=#bd93f9,fg=#282a36"

# Left: session in green, PREFIX indicator in pink
set -g status-left-length 60
set -g status-left "#[fg=#50fa7b,bold]#S #[fg=#ff79c6]#{?client_prefix,PREFIX ,}"

# Windows: grey for inactive, cyan highlight for active
setw -g window-status-separator "  "
setw -g window-status-format "#[fg=#555555]#I:#W"
setw -g window-status-current-format "#[fg=#8be9fd,bold]#I:#W#[default]"

# Right: mouse in pink | command in muted yellow | time
set -g status-right-length 80
set -g status-right "#[fg=#ff79c6]M:#{mouse}#[default] #[fg=#6272a4]|#[default] #[fg=#d4c078]#{pane_current_command}#[default] #[fg=#6272a4]|#[default] #[fg=#f8f8f2]%a %b %d %l:%M %p "
